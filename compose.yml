# 로컬 개발: postgres만 기동 후 ./gradlew bootRun 권장 (README 참조)
# 전체 기동: ./gradlew bootJar && docker compose up --build
# 배포용 엣지(caddy) compose는 별도 계층 — M5에서 infra/ 로 분리 (docs/arc42/07-deployment-view.md)
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: feedrelay
      POSTGRES_USER: feedrelay
      POSTGRES_PASSWORD: feedrelay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feedrelay -d feedrelay"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/feedrelay
      DB_USERNAME: feedrelay
      DB_PASSWORD: feedrelay
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-dummy-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-dummy-client-secret}
      TOKEN_ENC_KEY: ${TOKEN_ENC_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

volumes:
  pgdata:
