spring:
  application:
    name: feedrelay
  config:
    # 로컬 개발용 .env 로드 (KEY=VALUE ⊂ properties 문법) — OS 환경변수가 항상 우선
    import: optional:file:./.env[.properties]
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-client-secret}
            scope: openid,profile,email
          # 위임(tasks) — 로그인과 분리된 incremental consent (§8.5, §12 인증 계열)
          google-tasks:
            provider: google
            client-id: ${GOOGLE_CLIENT_ID:dummy-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-client-secret}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/authorized/google-tasks"
            scope: https://www.googleapis.com/auth/tasks
  session:
    jdbc:
      initialize-schema: always  # 프레임워크 부속 테이블은 프레임워크 소유 (ADR-0009 원칙)
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/feedrelay}
    username: ${DB_USERNAME:feedrelay}
    password: ${DB_PASSWORD:feedrelay}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

feedrelay:
  token-enc-key: ${TOKEN_ENC_KEY:}  # base64 32바이트 — 위임 토큰 암호화 키 (§8.5)
